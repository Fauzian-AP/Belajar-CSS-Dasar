<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List type dengan Font Awesome</title>
  <link rel="stylesheet" href="Style_26.0.css">
  <link rel="stylesheet" href="../Font Awesome/css/all.min.css">
</head>
<body>
  <ul class="fa-ul">
    <li>
      <span class="fa-li">
      <i class="fas fa-circle-check"></i>
    </span> List 1
  </li>
    <li>
      <span class="fa-li">
      <i class="fas fa-check-square"></i>
    </span> List 2
  </li>
    <li>
      <span class="fa-li">
      <i class="fas fa-arrow-right"></i>
    </span> List 3
  </li>
  </ul>
</body>
</html>
