<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Internal CSS</title>
    <!-- Menghubungkan HTML dengan CSS juga dapat di lakukan dengan cara internal style CSS, yaitu menggunakan tag HTML bernama '<style>' yg berada di dalam tag '<head>' -->
    <style>
      h1 {
        color: purple;
        font-weight: bold;
        text-align: center;
      }

      p {
        color: black;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <h1>Judul Artikel</h1>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Ex quasi esse
      sit, quas enim vero. Ea tempora ratione rem iusto quibusdam ab, quo
      doloribus saepe fugit. Provident aliquam sequi quasi.
    </p>
  </body>
</html>
