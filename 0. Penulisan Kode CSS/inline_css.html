<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline CSS</title>
  </head>
  <body>
      <!-- Menghubungkan HTML dengan CSS dapat dilakukan dengan cara Inline style CSS, yaitu mengisi secara langsung kode CSS ke dalam atribut HTML yg bernama 'style' -->
      <h1 style="
        color: purple;
        font-weight: bold;
        text-align: center;
      ">Judul Artikel Saya</h1>  
      <p style="
        color: black;
        font-size: 18px;
      ">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Ex quasi esse
        sit, quas enim vero. Ea tempora ratione rem iusto quibusdam ab, quo
        doloribus saepe fugit. Provident aliquam sequi quasi.
      </p>
      <!-- Untuk menggunakan lebih dari 1 style CSS dalam 1 atribut HTML, maka setelah sebuah style selesai di tutup dengan titik koma ';' -->
  </body>
</html>
