<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>External CSS</title>
    <!-- Menghubungkan HTML dengan CSS dengan cara yg paling efektif dan paling sering digunakan adalah dengan cara external style CSS, yaitu menggunakan tag HTML bernama '<link>' dengan atribut 'rel="stylesheet"' dan 'href="nama_file.css"' sebagai file dimana kode CSS di tulis -->
    <link rel="stylesheet" href="style_external.css" />
  </head>
  <body>
    <h1>Judul Artikel</h1>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Ex quasi esse
      sit, quas enim vero. Ea tempora ratione rem iusto quibusdam ab, quo
      doloribus saepe fugit. Provident aliquam sequi quasi.
    </p>
  </body>
</html>
