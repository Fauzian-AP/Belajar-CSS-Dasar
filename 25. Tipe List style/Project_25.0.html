<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List Style Type</title>
  <link rel="stylesheet" href="Style_25.0.css">
</head>
<body>
  <h4>UnOrdered List</h4>
  <ol>
    <li>List ke 1</li>
    <li>List ke 2</li>
    <li>List ke 3</li>
    <li>List ke 4</li>
    <li>List ke 5</li>
  </ol>

  <br>

  <h4>Ordered List</h4>
  <ul>
    <li>List ke 1</li>
    <li>List ke 2</li>
    <li>List ke 3</li>
    <li>List ke 4</li>
    <li>List ke 5</li>
  </ul>
</body>
</html>
