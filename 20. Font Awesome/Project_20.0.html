<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Font Awesome</title>
  <!-- Tag Link untuk menghubungkan file HTML dengan file CSS -->
  <link rel="stylesheet" href="Style_20.0.css">
  <!-- Tag Link untuk menghubungkan file HTML dengan Font Awesome -->
  <link rel="stylesheet" href="../Font Awesome/css/all.min.css">
</head>
<body>
  <!-- 
  Untuk mengecek kategori dan jenis icon dapat melihatnya di WEBSIDE 'Font awesome' di chrome.

  Tag i ( Untuk memanggil Font Awesome ) 
  
  Class dengan isi :
  1. FA'Nama Kategori' ( Kategori Font Awesome nya )
  2. Fa-'Nama Icon' ( Jenis Icon )
  -->

  <!-- Kategori Font Awesome Solid -->
  <i class="fas fa-home"></i>
  <i class="fas fa-download"></i>
  <i class="fas fa-user"></i>
  <!-- Kategori Font Awesome Brand ( Untuk Logo Brand ) -->
  <i class="fab fa-youtube"></i>
  <i class="fab fa-tiktok"></i>
</body>
</html>
